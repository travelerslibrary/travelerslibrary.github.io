/* Sanctuary Ember Dust */

.embers{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:4;
    overflow:hidden;
}

.embers span{
    position:absolute;
    bottom:-20px;

    width:6px;
    height:6px;

    border-radius:50%;

    background:#ffb347;
    box-shadow:0 0 8px #ffb347;
    opacity:.7;
  
    animation:floatUp linear infinite;
}

@keyframes floatUp{

    from{
        transform:
        translateY(0)
        translateX(0);

        opacity:0;
    }

    15%{
        opacity:.6;
    }

    85%{
        opacity:.4;
    }

    to{
        transform:
        translateY(-100vh)
        translateX(30px);

        opacity:0;
    }
}

}

const destination =

const sanctuaryKey = "ReMemBerInG-FlaMe";

content.innerHTML = `

</div>

❦ Continue Your Journey ❦

</a>

`;

}

function requestKey(event){

event.preventDefault();

document.getElementById(
'sanctuaryModal'
).style.display='flex';

}

function checkSanctuaryKey(){

const entered =
document.getElementById(
'sanctuaryInput'
).value;

if(
entered.trim().toLowerCase() ===
sanctuaryKey.toLowerCase()
){

localStorage.setItem(
"sanctuary_verified",
"true"
);

window.location.href =
destination;

}else{

document.getElementById(
'sanctuaryError'
).textContent =
'The Threshold remains closed.';

}

}

const audio =

document.getElementById(

'gatewayAudio'

);

let audioStarted = false;

function startAudio(){

if(audioStarted) return;

audioStarted = true;

audio.volume = 0.08;

audio.play().catch(()=>{});

let volume = 0.08;

const fade =

setInterval(()=>{

volume += 0.01;

if(volume >= 0.22){

volume = 0.45;

clearInterval(fade);

}

audio.volume = volume;

},300);

}

document.addEventListener(

'touchstart',

startAudio,

{once:true}

);

document.addEventListener(

'click',

startAudio,

{once:true}

);
