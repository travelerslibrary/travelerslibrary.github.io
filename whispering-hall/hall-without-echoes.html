<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Hall Without Echoes</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia, serif;
}

.scene{
position:relative;
width:100%;
height:100svh;
height:100dvh;
overflow:hidden;
background:#000;
}

/* Reference artwork becomes the actual chamber */
.bg{
position:absolute;
inset:0;

background:
linear-gradient(
to bottom,
rgba(0,0,0,.18),
rgba(0,0,0,.34)
),
url('hall-without-echoes.jpg');

background-size:cover;
background-position:center center;
background-repeat:no-repeat;

transform:scale(1.02);

}

/* Minimal sacred atmosphere only */
.haze{
position:absolute;
inset:0;

background:
radial-gradient(circle at center,
rgba(255,210,150,.04),
rgba(0,0,0,0) 58%);

mix-blend-mode:screen;

animation:breathe 12s ease-in-out infinite alternate;
}

/* Very subtle particles */
.particles{
position:absolute;
inset:0;
pointer-events:none;
opacity:.18;
background-image:
radial-gradient(circle, rgba(255,210,150,.7) 0.4px, transparent 0.5px);

background-size:120px 120px;

animation:drift 38s linear infinite;
}

/* Ancient whisper */
.whisper{
position:absolute;
left:50%;
bottom:10svh;

transform:translateX(-50%);

color:#d8b08a;

font-size:clamp(.95rem,1.2vw,1.4rem);
letter-spacing:.08em;
line-height:1.7;

text-align:center;

opacity:0;

text-shadow:
0 0 2px rgba(255,235,205,.12),
0 0 8px rgba(255,180,120,.05),
0 2px 6px rgba(0,0,0,.92);

animation:
emerge 6s ease forwards 1.8s;
}

/* tiny candle shimmer only */
.candle-glow{
position:absolute;
bottom:24%;
left:50%;
width:22vw;
height:22vw;

transform:translateX(-50%);

background:
radial-gradient(circle,
rgba(255,190,120,.08),
rgba(0,0,0,0) 70%);

mix-blend-mode:screen;

animation:flicker 5s ease-in-out infinite alternate;
}

@keyframes emerge{

0%{
opacity:0;
filter:blur(10px) brightness(.5);
transform:translateX(-50%) translateY(10px);
}

45%{
opacity:.18;
filter:blur(4px) brightness(.72);
}

100%{
opacity:.92;
filter:blur(.2px) brightness(.98);
transform:translateX(-50%) translateY(0px);
}

}

@keyframes drift{
from{transform:translateY(0px);}
to{transform:translateY(-120px);}
}

@keyframes breathe{
from{opacity:.5;}
to{opacity:.9;}
}

@keyframes flicker{
from{opacity:.35;}
to{opacity:.7;}
}

@media(max-width:700px){

.bg{
background-position:center center;
}

.whisper{
bottom:9svh;
max-width:82vw;
font-size:.95rem;
}

.candle-glow{
width:38vw;
height:38vw;
bottom:22%;
}

}

</style>

<script data-goatcounter="https://thesanctuary.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  
</head>

<body>

<script>

if(
localStorage.getItem(
"sanctuary_verified"
) !== "true"
){

window.location.href =
"/whispering-hall/the-chambers-await/";

}

</script>

<div class="scene">

<div class="bg"></div>

<div class="haze"></div>

<div class="particles"></div>

<div class="candle-glow"></div>

<div class="whisper">
Some halls remember who remains.
</div>

</div>

</body>
</html>
